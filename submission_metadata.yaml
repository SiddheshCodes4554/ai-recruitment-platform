ai_usage_summary: |
  Used Gemini for coding, refactoring, and code generation. Used Claude for architecting the Career Intelligence Engine and JD Requirement Graph. No candidate data was sent to any external API.

methodology_summary: |
  A recruiter-reasoning candidate discovery engine combining SentenceTransformers semantic retrieval, Pydantic validation schemas, a rule-based logical consistency filter (disqualifying all 70 honeypots), structured JD Requirement Graphs, and a Career Intelligence Engine that parses work history descriptions for action-verb and metric-based evidence of shipped ML/search systems (penalizing list-only stuffing by 50%).

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
